name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

  demo-e2e:
    name: Demo project e2e (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build fed
        run: cargo build --bin fed

      - name: Run demo project end-to-end
        run: FED="$PWD/target/debug/fed" examples/ci-demo/run-e2e.sh

  docker-tests:
    name: Docker integration tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ubuntu-latest ships a working Docker daemon; the 32 container-backed tests are
      # #[ignore]d without this feature (kept off local `cargo test`) and run here.
      # --test-threads=1: the compose tests share one Docker Compose project (derived
      # from the fixture path), so they must not run concurrently or they tear down
      # each other's containers.
      - name: Run Docker-backed integration tests
        run: cargo test --features docker-tests -- --test-threads=1

  future-incompat:
    name: Future-incompat check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Catches a dependency that rustc will make a hard error in a future
      # release before it bites us (e.g. block v0.1.6's uninhabited static,
      # rust-lang/rust#74840 — dropped along with cli-clipboard, its sole
      # entry point into this tree). No new tool: this reuses `cargo build`.
      - name: Build and check for future-incompat warnings
        run: |
          cargo build --future-incompat-report 2>&1 | tee build.log
          if grep -q "will be rejected by a future version of Rust" build.log; then
            echo "::error::A dependency will be rejected by a future Rust version. Run 'cargo report future-incompatibilities' locally."
            exit 1
          fi

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Pinned rather than tracking stable: with -D warnings, a new Rust
      # release can turn main red without a code change, as the 1.97
      # collapsible_if expansion did. Bump this deliberately.
      # scripts/lint-linux.sh should be bumped to match.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.97"
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  orchestrator-construction-gate:
    name: Orchestrator construction gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # clippy::disallowed_methods (clippy.toml) catches bin/integration-test
      # bypasses of OrchestratorBuilder, but not library-internal calls from
      # one src/orchestrator/*.rs file to another (same crate, no boundary
      # for clippy to see). This plain-text scan closes that gap.
      - name: Check for raw Orchestrator construction in src/orchestrator/**
        run: ./scripts/check-orchestrator-construction.sh

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check documentation
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings
