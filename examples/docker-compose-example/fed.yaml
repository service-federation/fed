parameters:
  DB_PASSWORD:
    default: mysecretpassword

  DB_NAME:
    default: myapp

  API_PORT:
    type: port
    default: 8080

  # Host-mapped ports for the compose-referenced services below. fed doesn't
  # rewrite ports declared inside an external docker-compose.yml, but it does
  # pass each service's resolved `environment:` to the `docker compose up`
  # subprocess — so declaring these as `type: port` and referencing them via
  # docker compose's own `${VAR}` substitution in docker-compose.yml gets the
  # same per-worktree isolation as a native fed service.
  DB_PORT:
    type: port
    default: 5432

  REDIS_PORT:
    type: port
    default: 6379

  ES_PORT:
    type: port
    default: 9200

services:
  # Reference individual services from docker-compose.yml
  postgres:
    compose_file: ./docker-compose.yml
    compose_service: postgres
    environment:
      POSTGRES_PASSWORD: '{{DB_PASSWORD}}'
      POSTGRES_DB: '{{DB_NAME}}'
      DB_PORT: '{{DB_PORT}}'
    healthcheck:
      command: pg_isready -U postgres

  redis:
    compose_file: ./docker-compose.yml
    compose_service: redis
    environment:
      REDIS_PORT: '{{REDIS_PORT}}'
    depends_on:
      - postgres

  # Mix compose services with native fed services
  api:
    process: |
      echo "API starting on port {{API_PORT}}"
      echo "Database: {{DB_NAME}}"
      echo "Connecting to postgres and redis..."
      while true; do
        echo "API running on port {{API_PORT}}"
        sleep 3
      done
    environment:
      PORT: '{{API_PORT}}'
      DATABASE_URL: 'postgresql://postgres:{{DB_PASSWORD}}@localhost:{{DB_PORT}}/{{DB_NAME}}'
      REDIS_URL: 'redis://localhost:{{REDIS_PORT}}'
    depends_on:
      - postgres
      - redis
    healthcheck:
      command: echo "API is healthy"

  # Another compose service depending on the API
  elasticsearch:
    compose_file: ./docker-compose.yml
    compose_service: elasticsearch
    environment:
      ES_PORT: '{{ES_PORT}}'
    depends_on:
      - api

entrypoint: api
