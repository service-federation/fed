# Example: Service Templates
# Demonstrates using local templates to reduce configuration duplication

parameters:
  PG_PORT:
    type: port
    default: 5432
  AUTH_PORT:
    type: port
    default: 8080
  USER_PORT:
    type: port
    default: 8081
  PAYMENT_PORT:
    type: port
    default: 8082
  WEB_PORT:
    type: port
    default: 3000

# Define reusable service templates.
# Note: template placeholders resolve against the global parameters above —
# a template can't rename them per service, so per-service healthchecks
# (which need each service's own port) live on the services themselves.
templates:
  # Template for Java-based microservices
  java-microservice:
    image: openjdk:17-slim
    environment:
      JAVA_OPTS: '-Xmx512m -Xms256m'
      SPRING_PROFILES_ACTIVE: 'dev'
    restart: always
    volumes:
      - './logs:/app/logs'

  # Template for Node.js services
  node-service:
    image: node:18-alpine
    environment:
      NODE_ENV: 'development'
    restart: always

services:
  # PostgreSQL database
  postgres:
    image: postgres:15
    ports: ["{{PG_PORT}}:5432"]
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: myapp
    healthcheck:
      command: 'pg_isready -U postgres'

  # Auth service extends java-microservice template
  auth-service:
    extends: java-microservice
    ports: ["{{AUTH_PORT}}:{{AUTH_PORT}}"]
    depends_on: [postgres]
    environment:
      PORT: '{{AUTH_PORT}}'
      DATABASE_URL: 'postgres://postgres:password@localhost:{{PG_PORT}}/myapp'
      SERVICE_NAME: 'auth-service'
    healthcheck:
      http_get: 'http://localhost:{{AUTH_PORT}}/actuator/health'
    # Inherits: image, JAVA_OPTS, restart, volumes

  # User service also extends java-microservice template
  user-service:
    extends: java-microservice
    ports: ["{{USER_PORT}}:{{USER_PORT}}"]
    depends_on: [postgres, auth-service]
    environment:
      PORT: '{{USER_PORT}}'
      DATABASE_URL: 'postgres://postgres:password@localhost:{{PG_PORT}}/myapp'
      AUTH_SERVICE_URL: 'http://localhost:{{AUTH_PORT}}'
      SERVICE_NAME: 'user-service'
    healthcheck:
      http_get: 'http://localhost:{{USER_PORT}}/actuator/health'
    # Inherits: image, JAVA_OPTS, restart, volumes

  # Payment service extends java-microservice template
  payment-service:
    extends: java-microservice
    ports: ["{{PAYMENT_PORT}}:{{PAYMENT_PORT}}"]
    depends_on: [postgres, auth-service]
    environment:
      PORT: '{{PAYMENT_PORT}}'
      DATABASE_URL: 'postgres://postgres:password@localhost:{{PG_PORT}}/myapp'
      AUTH_SERVICE_URL: 'http://localhost:{{AUTH_PORT}}'
      SERVICE_NAME: 'payment-service'
    healthcheck:
      http_get: 'http://localhost:{{PAYMENT_PORT}}/actuator/health'
    # Inherits: image, JAVA_OPTS, restart, volumes

  # Frontend extends node-service template
  frontend:
    extends: node-service
    ports: ["{{WEB_PORT}}:{{WEB_PORT}}"]
    depends_on: [auth-service, user-service]
    environment:
      PORT: '{{WEB_PORT}}'
      API_BASE_URL: 'http://localhost:{{AUTH_PORT}}'
      USER_SERVICE_URL: 'http://localhost:{{USER_PORT}}'
    healthcheck:
      http_get: 'http://localhost:{{WEB_PORT}}/health'
    # Inherits: image, NODE_ENV, restart

entrypoint: frontend
