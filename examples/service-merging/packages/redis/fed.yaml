# Redis cache package - reusable Redis configuration
#
# No `ports:` here on purpose: fed.yaml packages can't declare their own
# `parameters:` block, and fed's package merge combines port lists rather
# than replacing them — see ../database/fed.yaml for the full reasoning.
# The host port is the importing application's call; see ../../fed.yaml
# for the `{{CACHE_PORT}}:6379` override.
services:
  redis:
    image: redis:7-alpine
    volumes:
      - "redis-data:/data"
    healthcheck:
      command: "redis-cli ping"
    restart: always
    # Marks this service as the package's public API — required as of
    # fed 8.0 for any service extended via `extends: "cache-package.redis"`.
    expose: true
