# Main application configuration that extends package services

packages:
  - source: "./packages/database"
    as: "db-package"
  - source: "./packages/redis"
    as: "cache-package"

# Packages contribute services, not parameters — every host-mapped port
# used below must be declared here, in the config that actually imports
# the packages.
parameters:
  DB_PORT:
    type: port
    default: 5432

  CACHE_PORT:
    type: port
    default: 6379

  WEB_PORT:
    type: port
    default: 3000

services:
  # Database service extending the base postgres configuration
  database:
    extends: "db-package.postgres"
    # Override the database name for this application
    environment:
      POSTGRES_DB: "myapp"
      APP_NAME: "MyApplication"
    # Add custom volume for backups
    volumes:
      - "./backups:/backups"
    # Host port mapping — lives here, not in the package (see
    # packages/database/fed.yaml for why).
    ports:
      - "{{DB_PORT}}:5432"

  # Cache service extending the base redis configuration
  cache:
    extends: "cache-package.redis"
    # Host port mapping — lives here, not in the package.
    ports:
      - "{{CACHE_PORT}}:6379"
    # Add custom config
    volumes:
      - "./redis.conf:/usr/local/etc/redis/redis.conf"

  # Application service that depends on the extended services
  web:
    cwd: ./app
    install: npm install
    process: npm start
    environment:
      # fed's `image:` services run without a shared Docker network, so
      # sibling services are reached via localhost + host port, not the
      # fed service name as a hostname.
      DATABASE_URL: "postgres://admin:secret@localhost:{{DB_PORT}}/myapp"
      REDIS_URL: "redis://localhost:{{CACHE_PORT}}"
    ports:
      - "{{WEB_PORT}}:{{WEB_PORT}}"
    depends_on:
      - database
      - cache
    healthcheck:
      http_get: "http://localhost:{{WEB_PORT}}/health"

entrypoint: web
